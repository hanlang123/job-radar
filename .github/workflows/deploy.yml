# 自动部署工作流 —— push 到 main 分支后自动部署到远程服务器
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DOCKER_COMPOSE_FILE: docker/docker-compose.prod.yml
  DEPLOY_DIR: /opt/jobRadar

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 如果使用 Docker Hub，取消注释以下步骤并配置相关 Secrets
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 如果使用 GitHub Container Registry (推荐)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & Push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/server:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/server:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}/web:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      repo_lower: ${{ steps.meta.outputs.repo_lower }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "docker/docker-compose.prod.yml,docker/nginx.conf"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.sha_short }}
          REPO_LOWER: ${{ needs.build-and-push.outputs.repo_lower }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: IMAGE_TAG,REPO_LOWER,OPENAI_API_KEY,JWT_SECRET,JWT_REFRESH_SECRET,GHCR_PAT,GHCR_USER
          script: |
            set -e

            DEPLOY_DIR=/opt/jobRadar
            cd "$DEPLOY_DIR"

            # 登录 GHCR（使用部署令牌）
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            # 创建生产 docker-compose override 文件，使用预构建镜像替代本地构建
            cat > docker/docker-compose.images.yml << EOFCOMPOSE
            version: '3.8'
            services:
              server:
                image: ghcr.io/${REPO_LOWER}/server:${IMAGE_TAG}
              web:
                image: ghcr.io/${REPO_LOWER}/web:${IMAGE_TAG}
            EOFCOMPOSE

            # 导出环境变量供 docker-compose 使用
            export OPENAI_API_KEY="${OPENAI_API_KEY}"
            export JWT_SECRET="${JWT_SECRET}"
            export JWT_REFRESH_SECRET="${JWT_REFRESH_SECRET}"

            # 拉取最新镜像
            docker pull "ghcr.io/${REPO_LOWER}/server:${IMAGE_TAG}"
            docker pull "ghcr.io/${REPO_LOWER}/web:${IMAGE_TAG}"

            # 停止旧容器并启动新容器（images.yml 覆盖 prod.yml 中的 build 配置）
            docker compose -f docker/docker-compose.prod.yml -f docker/docker-compose.images.yml down --remove-orphans || true
            docker compose -f docker/docker-compose.prod.yml -f docker/docker-compose.images.yml up -d

            # 等待服务健康启动
            echo "等待服务启动..."
            sleep 10

            # 健康检查
            echo "执行健康检查..."
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            # 清理旧镜像
            docker image prune -f
