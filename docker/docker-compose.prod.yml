# 生产部署 - 复用服务器上已有的 PostgreSQL 和 Redis
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: jobRadar-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: jobRadar-server
    expose:
      - '3001'
    environment:
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: 5432
      DATABASE_USER: jobRadar
      DATABASE_PASSWORD: jobRadar123
      DATABASE_NAME: jobRadar
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-jobRadar-jwt-secret-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-jobRadar-jwt-refresh-secret-prod}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: https://api.deepseek.com/v1
      OPENAI_MODEL: deepseek-chat
      SERVER_PORT: 3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: jobRadar-web
    expose:
      - '3000'
    environment:
      # SSR 服务端请求走容器内部网络
      NUXT_API_BASE_SERVER: http://server:3001/api
      # 浏览器端请求走 nginx 反向代理（相对路径）
      NUXT_PUBLIC_API_BASE: /api
    depends_on:
      - server
    restart: unless-stopped
